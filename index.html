<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Resource Hub</title>

  <link rel="stylesheet" href="style.css">

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <script type="module" src="js/main.js"></script>

  <link rel="apple-touch-icon" sizes="180x180" href="favicon_io/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon_io/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon_io/favicon-16x16.png">
  <link rel="manifest" href="favicon_io/site.webmanifest">

</head>

<body>

<button id="scrollTopBtn" class="scroll-top-btn">↑</button>

<h1>📁 Resource Hub</h1>

<div class="topbar">
  <div class="status" id="statusText">Viewing All Files</div>

  <div class="top-actions">
    <button class="btn" id="resetBtn">Show All</button>
    <button class="btn" id="clearFiltersBtn">Clear Filters</button>

    <div class="filter-wrapper">
      <button class="filter-btn" id="filterBtn">
        <span id="filterArrow">▼</span>
        Filters
      </button>

      <div id="filterMenu" class="filter-menu"></div>
    </div>
  </div>
</div>

<input type="text" id="search" placeholder="Search...">

<div class="layout">

  <!-- =========================
       ADVANCED PANEL
  ========================= -->
  <div id="advancedPanel" class="advanced-panel">

    <div class="advanced-header">
      <div class="advanced-title">Advanced Filtering</div>

      <div class="advanced-header-actions">

        <!-- HELP WRAPPER (IMPORTANT) -->
        <div class="help-wrapper">

          <button
            class="help-btn"
            id="advancedHelpBtn"
            type="button"
            aria-label="How advanced filtering works"
          >
            ?
          </button>

          <!-- TOOLTIP -->
          <div class="help-tooltip" id="advancedHelpTooltip">
              Select tags to build filters.<br><br>

            <b>Within a row:</b> OR logic / items can match ANY selected tag.<br>
            <b>Between rows:</b> AND / NOT logic<br><br>

            Example:<br>
            Row 1: "Project" OR "5 mins."<br>
            Row 2 (NOT): "1 hour"<br><br>

            (Project || 5 mins.) && !(1 hour)
          </div>

        </div>

        <!-- CLOSE BUTTON -->
        <button
          class="panel-close-btn"
          id="closeAdvancedPanel"
          aria-label="Close advanced filters"
        >
          ✕
        </button>

      </div>
    </div>

    <div id="advancedRows"></div>

    <div class="advanced-divider"></div>

    <button id="addAdvancedRow" class="advanced-add">
      + Add Row
    </button>

    <div class="advanced-footer">
      <button id="clearAdvanced" class="btn secondary">Clear All</button>
      <button id="applyAdvanced" class="apply-btn">Apply</button>
    </div>

  </div>

  <!-- =========================
       MAIN CONTENT
  ========================= -->
  <div class="main-content">
    <div id="container"></div>
  </div>

</div>

<!-- TAG DROPDOWN -->
<div id="globalTagDropdown" class="tag-dropdown hidden"></div>

</body>
</html>
