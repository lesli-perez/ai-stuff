<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Resource Hub</title>

  <link rel="stylesheet" href="style.css">

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <script type="module" src="js/main.js"></script>
</head>

<button id="scrollTopBtn" class="scroll-top-btn">↑</button>

<body>

<h1>📁 Resource Hub</h1>

<div class="topbar">
  <div class="status" id="statusText">Viewing All Files</div>

  <div class="top-actions">
    <button class="btn" id="resetBtn">Show All</button>
    <button class="btn" id="clearFiltersBtn">Clear Filters</button>

    <div class="filter-wrapper">
      <button class="filter-btn" id="filterBtn">
        <span id="filterArrow">▼</span>
        Filters
      </button>

      <div id="filterMenu" class="filter-menu"></div>
    </div>
  </div>
</div>

<input type="text" id="search" placeholder="Search...">
<div class="layout">
  <div id="advancedPanel" class="advanced-panel">
     <div class="advanced-header">
      <div class="advanced-title">Advanced Filtering</div>

      <button class="panel-close-btn" id="closeAdvancedPanel" aria-label="Close advanced filters">
        ✕
      </button>
      </div>

    <div id="advancedRows"></div>

    <div class="advanced-divider"></div>
    <button id="addAdvancedRow" class="advanced-add">
      + Add Row
    </button>

    <div class="advanced-footer">
      <button id="clearAdvanced" class="btn secondary">Clear All</button>
      <button id="applyAdvanced" class="apply-btn">Apply</button>
    </div>
  </div>

  <div class="main-content">
    <div id="container"></div>
  </div>
</div>


<div id="globalTagDropdown" class="tag-dropdown hidden"></div>

</body>
</html>
