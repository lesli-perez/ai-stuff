<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Resource Hub</title>

  <link rel="stylesheet" href="style.css">

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <script src="script.js" defer></script>
</head>

<button id="scrollTopBtn" class="scroll-top-btn">↑</button>

<body>

<h1>📁 Resource Hub</h1>

<div class="topbar">
  <div class="status" id="statusText">Viewing All Files</div>

  <div class="top-actions">
    <button class="reset-btn" id="resetBtn">Show All</button>
    <button class="clear-btn" id="clearFiltersBtn">Clear Filters</button>

    <div class="filter-wrapper">
      <button class="filter-btn" id="filterBtn">
        <span id="filterArrow">▼</span>
        Filters
      </button>

      <div id="filterMenu" class="filter-menu"></div>
    </div>
  </div>
</div>

<input type="text" id="search" placeholder="Search...">
<div class="layout">
  <div id="advancedPanel" class="advanced-panel">
    <div class="advanced-title">Advanced Filtering</div>

    <div id="advancedRows"></div>

    <button id="addAdvancedRow" class="advanced-add">
      + Add Filter Row
    </button>

    <div class="advanced-footer">
      <button id="clearAdvanced" class="clear-all-btn">Clear All</button>
      <button id="applyAdvanced" class="apply-btn">Apply</button>
    </div>
  </div>

  <div class="main-content">
    <div id="container"></div>
  </div>
</div>

<div id="container"></div>

</body>
</html>
